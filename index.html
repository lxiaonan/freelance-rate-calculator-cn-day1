<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自由职业报价换算器 | Freelance Rate Calculator</title>
  <meta name="description" content="一个帮助自由职业者、顾问和独立开发者快速换算时薪、日薪和项目报价的实用网站。">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow" data-i18n="eyebrow">报价别再靠感觉</p>
        <h1 data-i18n="title">自由职业报价换算器</h1>
        <p class="subtitle" data-i18n="subtitle">
          输入你的目标收入、可计费工时和风险缓冲，快速得到更稳妥的时薪、日薪和项目报价建议。
        </p>
      </div>
      <button class="language-switch" id="language-switch" type="button">EN</button>
    </header>

    <main class="layout">
      <section class="card form-card">
        <h2 data-i18n="inputsTitle">输入条件</h2>
        <div class="field-grid">
          <label class="field">
            <span data-i18n="monthlyIncome">目标月收入</span>
            <input id="monthly-income" type="number" min="0" step="100" value="25000">
          </label>
          <label class="field">
            <span data-i18n="monthlyExpenses">每月固定成本</span>
            <input id="monthly-expenses" type="number" min="0" step="100" value="3000">
          </label>
          <label class="field">
            <span data-i18n="billableHours">每周可计费小时</span>
            <input id="billable-hours" type="number" min="1" max="80" step="1" value="24">
          </label>
          <label class="field">
            <span data-i18n="vacationWeeks">每年休假周数</span>
            <input id="vacation-weeks" type="number" min="0" max="20" step="1" value="4">
          </label>
          <label class="field">
            <span data-i18n="overheadRate">非计费时间占比</span>
            <input id="overhead-rate" type="number" min="0" max="90" step="1" value="30">
          </label>
          <label class="field">
            <span data-i18n="bufferRate">税费与风险缓冲</span>
            <input id="buffer-rate" type="number" min="0" max="100" step="1" value="18">
          </label>
          <label class="field field-wide">
            <span data-i18n="projectHours">预估项目工时</span>
            <input id="project-hours" type="number" min="1" step="1" value="36">
          </label>
          <label class="field field-wide">
            <span data-i18n="projectRisk">项目额外风险系数</span>
            <input id="project-risk" type="number" min="0" max="100" step="1" value="15">
          </label>
        </div>
      </section>

      <section class="card results-card">
        <div class="results-header">
          <h2 data-i18n="resultsTitle">报价结果</h2>
          <p data-i18n="resultsHint">这些数值是基于你输入参数生成的建议值，可作为报价起点。</p>
        </div>
        <div class="result-grid">
          <article class="result-box accent">
            <p data-i18n="hourlyRate">建议时薪</p>
            <strong id="hourly-rate">¥0</strong>
          </article>
          <article class="result-box">
            <p data-i18n="dailyRate">建议日薪</p>
            <strong id="daily-rate">¥0</strong>
          </article>
          <article class="result-box">
            <p data-i18n="monthlyRevenue">月营收目标</p>
            <strong id="monthly-revenue">¥0</strong>
          </article>
          <article class="result-box accent-soft">
            <p data-i18n="projectQuote">建议项目报价</p>
            <strong id="project-quote">¥0</strong>
          </article>
        </div>
        <div class="insight-list">
          <div class="insight">
            <span data-i18n="annualBillableHours">全年可计费工时</span>
            <strong id="annual-billable-hours">0h</strong>
          </div>
          <div class="insight">
            <span data-i18n="effectiveUtilization">有效利用率</span>
            <strong id="effective-utilization">0%</strong>
          </div>
          <div class="insight">
            <span data-i18n="projectBuffer">项目风险缓冲</span>
            <strong id="project-buffer">0%</strong>
          </div>
        </div>
      </section>
    </main>

    <section class="card formula-card">
      <h2 data-i18n="formulaTitle">计算逻辑</h2>
      <ol>
        <li data-i18n="formula1">先把目标月收入和每月固定成本相加，得到月营收目标。</li>
        <li data-i18n="formula2">再根据每周可计费小时、休假周数和非计费时间占比，估算全年真实可售工时。</li>
        <li data-i18n="formula3">最后叠加税费与风险缓冲，得到更稳妥的时薪、日薪和项目报价。</li>
      </ol>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
